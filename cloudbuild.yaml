steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [build, -t, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA', -t, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest', .]
    id: build

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend']
    id: push
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud run services describe minddash-agent --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/agent_url.txt
        gcloud run services describe minddash-dashboards --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/dash_url.txt
        gcloud run deploy minddash-backend \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA \
          --region=${_REGION} --project=$PROJECT_ID \
          --service-account=minddash-backend-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --update-env-vars="CHAT_ENDPOINT_URL=$(cat /workspace/agent_url.txt)/chat,RENDER_CHART_ENDPOINT=$(cat /workspace/dash_url.txt)/preview_legacy,ENDPOINT_RENDER_TABLE_IMG=$(cat /workspace/dash_url.txt)/render-table"
    id: deploy
    waitFor: ['push']

substitutions:
  _REGION: us-central1
  _REPO: minddash-repo

options:
  substitution_option: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
