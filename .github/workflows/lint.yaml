name: Check Linting and Formatting

on:
    pull_request:
        branches: [ "main" , "dev" ]
    push:
        branches: [ "main" , "dev" ]

jobs:
    ruff-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: astral-sh/setup-uv@v6
            - name: Check format
              run: uvx ruff format --check
            - name: Check lint
              run: uvx ruff check